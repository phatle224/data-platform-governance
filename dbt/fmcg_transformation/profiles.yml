# ══════════════════════════════════════════════════════════════════════════════
# dbt Profile — Connection to Project A's PostgreSQL
# Uses environment variables injected by Airflow Docker container
# ══════════════════════════════════════════════════════════════════════════════

fmcg_transformation:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'fmcg-postgres') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_POSTGRES_USER', 'postgres') }}"
      pass: "{{ env_var('DBT_POSTGRES_PASSWORD', 'postgrespassword') }}"
      dbname: "{{ env_var('DBT_POSTGRES_DB', 'fmcg') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0
