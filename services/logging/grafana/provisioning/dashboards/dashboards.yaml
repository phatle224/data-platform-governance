# ══════════════════════════════════════════════════════════════════════════════
# Grafana Dashboard Provisioning — Governance Dashboards
# If using auto-provisioning, copy to Grafana's provisioning directory
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: governance-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/governance
      foldersFromFilesStructure: false
