# ══════════════════════════════════════════════════════════════════════════════
# Airflow + dbt Stack for Data Transformation & OpenLineage
# Custom Airflow with dbt-postgres pre-installed
# ══════════════════════════════════════════════════════════════════════════════

volumes:
  airflow-postgres-data:

services:
  # ── Airflow Metadata DB (PostgreSQL) ─────────────────────────────────────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: gov-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-15434}:5432"
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - gov-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init (one-time setup: create DB + admin user) ────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gov-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-admin} \
          --password ${AIRFLOW_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@gov-airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - gov-internal

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gov-airflow-webserver
    restart: unless-stopped
    command: airflow webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@gov-airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080
      # OpenLineage integration
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://gov-openmetadata-server:8585/api/v1/lineage/openlineage", "endpoint": ""}'
      AIRFLOW__OPENLINEAGE__DISABLED: "false"
      # StatsD metrics → Phase 3 Alerting
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: gov-statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      # dbt environment variables
      DBT_POSTGRES_HOST: ${FMCG_POSTGRES_HOST:-fmcg-postgres}
      DBT_POSTGRES_PORT: ${FMCG_POSTGRES_PORT:-5432}
      DBT_POSTGRES_USER: ${FMCG_POSTGRES_USER:-postgres}
      DBT_POSTGRES_PASSWORD: ${FMCG_POSTGRES_PASSWORD:-postgrespassword}
      DBT_POSTGRES_DB: ${FMCG_POSTGRES_DB:-fmcg}
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ../../dbt:/opt/airflow/dbt:ro
      - ./logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - gov-internal
      - fmcg-network  # Need access to Project A for dbt transformations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gov-airflow-scheduler
    restart: unless-stopped
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@gov-airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # OpenLineage integration
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://gov-openmetadata-server:8585/api/v1/lineage/openlineage", "endpoint": ""}'
      AIRFLOW__OPENLINEAGE__DISABLED: "false"
      # StatsD metrics → Phase 3 Alerting
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: gov-statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: 9125
      AIRFLOW__METRICS__STATSD_PREFIX: airflow
      # dbt environment variables
      DBT_POSTGRES_HOST: ${FMCG_POSTGRES_HOST:-fmcg-postgres}
      DBT_POSTGRES_PORT: ${FMCG_POSTGRES_PORT:-5432}
      DBT_POSTGRES_USER: ${FMCG_POSTGRES_USER:-postgres}
      DBT_POSTGRES_PASSWORD: ${FMCG_POSTGRES_PASSWORD:-postgrespassword}
      DBT_POSTGRES_DB: ${FMCG_POSTGRES_DB:-fmcg}
    volumes:
      - ./dags:/opt/airflow/dags
      - ../../dbt:/opt/airflow/dbt:ro
      - ./logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - gov-internal
      - fmcg-network  # Need access to Project A for dbt transformations

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  gov-internal:
    driver: bridge
  fmcg-network:
    name: fmcg_fmcg-network
    external: true
