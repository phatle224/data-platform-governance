# ══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration — Governance Stack
# Scrapes Airflow metrics via StatsD Exporter
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alert Rules ───────────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── AlertManager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "gov-alertmanager:9093"

# ── Scrape Targets ────────────────────────────────────────────────────────────
scrape_configs:
  # Self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Airflow metrics via StatsD Exporter
  - job_name: "airflow-statsd"
    static_configs:
      - targets: ["gov-statsd-exporter:9102"]
    metrics_path: /metrics
    scrape_interval: 10s

  # AlertManager health
  - job_name: "alertmanager"
    static_configs:
      - targets: ["gov-alertmanager:9093"]
