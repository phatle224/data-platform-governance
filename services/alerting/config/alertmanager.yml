# ══════════════════════════════════════════════════════════════════════════════
# AlertManager Configuration — Route Alerts to Slack
# Replace SLACK_WEBHOOK_URL with your actual Slack Incoming Webhook URL
# ══════════════════════════════════════════════════════════════════════════════

global:
  # How long to wait before sending a notification about an alert group for
  # the first time. Allows to buffer & collect initial alerts.
  resolve_timeout: 5m

# ── Route Tree ────────────────────────────────────────────────────────────────
route:
  # Default receiver
  receiver: "slack-alerts"
  # How long to wait before sending a notification about new alerts added to a
  # group of alerts for which an initial notification has already been sent.
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Group alerts by these labels
  group_by: ["alertname", "severity"]

  # Route critical alerts immediately
  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "slack-alerts"
      group_wait: 1m
      repeat_interval: 4h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  # Default Slack channel for warnings
  - name: "slack-alerts"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#data-platform-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}{{ if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'
        actions:
          - type: button
            text: "🔍 View in Airflow"
            url: "http://localhost:8082"
          - type: button
            text: "📊 Prometheus"
            url: "http://localhost:9095"

  # Critical alerts — separate channel with faster notification
  - name: "slack-critical"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#data-platform-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: "danger"
        actions:
          - type: button
            text: "🚨 View in Airflow"
            url: "http://localhost:8082"
          - type: button
            text: "📊 Prometheus"
            url: "http://localhost:9095"

# ── Inhibition Rules ──────────────────────────────────────────────────────────
# Suppress warning when critical is already firing for the same alertname
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

# ── Templates ─────────────────────────────────────────────────────────────────
templates:
  - "/etc/alertmanager/templates/*.tmpl"
