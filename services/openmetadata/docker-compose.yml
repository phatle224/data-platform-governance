# ══════════════════════════════════════════════════════════════════════════════
# OpenMetadata Stack: Server + MySQL (metadata DB) + Elasticsearch + Ingestion
# Connects to Project A's fmcg-network to access data sources
# ══════════════════════════════════════════════════════════════════════════════

volumes:
  ingestion-volume-dag-airflow:
  ingestion-volume-dags:
  ingestion-volume-tmp:
  es-data:
  mysql-data:

services:
  # ── MySQL (OpenMetadata internal metadata storage) ───────────────────────────
  mysql:
    image: docker.getcollate.io/openmetadata/db:${OPENMETADATA_VERSION:-1.6.5}
    container_name: gov-mysql
    command: "--sort_buffer_size=10M"
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - gov-internal
    healthcheck:
      test: mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --silent --execute "use openmetadata_db"
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Elasticsearch (OpenMetadata search engine) ───────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: gov-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "${ELASTICSEARCH_PORT:-19200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - gov-internal
    healthcheck:
      test: "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10

  # ── OpenMetadata: Schema Migration ──────────────────────────────────────────
  execute-migrate-all:
    container_name: gov-execute-migrate-all
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.6.5}
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      SERVER_PORT: ${OPENMETADATA_PORT:-8585}
      SERVER_ADMIN_PORT: ${OPENMETADATA_ADMIN_PORT:-8586}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MIGRATION_LIMIT_PARAM: ${MIGRATION_LIMIT_PARAM:-1200}

      # Authentication
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_ALLOWED_REGISTRATION_DOMAIN: '["all"]'
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"
      AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
      AUTHORIZER_ENABLE_SECURE_SOCKET: "false"
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: "[http://localhost:8585/api/v1/system/config/jwks]"
      AUTHENTICATION_ENABLE_SELF_SIGNUP: "true"

      # JWT
      RSA_PUBLIC_KEY_FILE_PATH: "./conf/public_key.der"
      RSA_PRIVATE_KEY_FILE_PATH: "./conf/private_key.der"
      JWT_ISSUER: "open-metadata.org"
      JWT_KEY_ID: "Gb389a-9f76-gdjs-a92j-0242bk94356"

      # Pipeline Service Client
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://gov-ingestion:8080
      SERVER_HOST_API_URL: http://gov-openmetadata-server:8585/api
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: "no-ssl"
      PIPELINE_SERVICE_CLIENT_ENABLED: "true"
      PIPELINE_SERVICE_CLIENT_CLASS_NAME: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"
      AIRFLOW_USERNAME: ${AIRFLOW_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      FERNET_KEY: ${AIRFLOW_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}

      # Database
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: ${DB_USER:-openmetadata_user}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD:-openmetadata_password}
      DB_HOST: gov-mysql
      DB_PORT: 3306
      OM_DATABASE: ${OM_DATABASE:-openmetadata_db}

      # Elasticsearch
      ELASTICSEARCH_HOST: gov-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      SEARCH_TYPE: "elasticsearch"

      # Monitoring
      EVENT_MONITOR: prometheus
      OPENMETADATA_HEAP_OPTS: "-Xmx1G -Xms1G"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - gov-internal

  # ── OpenMetadata Server ─────────────────────────────────────────────────────
  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:${OPENMETADATA_VERSION:-1.6.5}
    container_name: gov-openmetadata-server
    restart: unless-stopped
    environment:
      OPENMETADATA_CLUSTER_NAME: ${OPENMETADATA_CLUSTER_NAME:-openmetadata}
      SERVER_PORT: ${OPENMETADATA_PORT:-8585}
      SERVER_ADMIN_PORT: ${OPENMETADATA_ADMIN_PORT:-8586}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Authentication
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_ALLOWED_REGISTRATION_DOMAIN: '["all"]'
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"
      AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN: "false"
      AUTHORIZER_ENABLE_SECURE_SOCKET: "false"
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: "[http://localhost:8585/api/v1/system/config/jwks]"
      AUTHENTICATION_ENABLE_SELF_SIGNUP: "true"

      # JWT
      RSA_PUBLIC_KEY_FILE_PATH: "./conf/public_key.der"
      RSA_PRIVATE_KEY_FILE_PATH: "./conf/private_key.der"
      JWT_ISSUER: "open-metadata.org"
      JWT_KEY_ID: "Gb389a-9f76-gdjs-a92j-0242bk94356"

      # Pipeline Service Client
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://gov-ingestion:8080
      SERVER_HOST_API_URL: http://gov-openmetadata-server:8585/api
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: "no-ssl"
      PIPELINE_SERVICE_CLIENT_ENABLED: "true"
      PIPELINE_SERVICE_CLIENT_CLASS_NAME: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"
      AIRFLOW_USERNAME: ${AIRFLOW_USER:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      FERNET_KEY: ${AIRFLOW_FERNET_KEY:-jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=}

      # Database
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: ${DB_USER:-openmetadata_user}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD:-openmetadata_password}
      DB_HOST: gov-mysql
      DB_PORT: 3306
      OM_DATABASE: ${OM_DATABASE:-openmetadata_db}

      # Elasticsearch
      ELASTICSEARCH_HOST: gov-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      SEARCH_TYPE: "elasticsearch"

      # Monitoring
      EVENT_MONITOR: prometheus
      OPENMETADATA_HEAP_OPTS: "-Xmx1G -Xms1G"
    ports:
      - "${OPENMETADATA_PORT:-8585}:8585"
      - "${OPENMETADATA_ADMIN_PORT:-8586}:8586"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
      execute-migrate-all:
        condition: service_completed_successfully
    networks:
      - gov-internal
      - fmcg-network  # Connect to Project A to scan its databases
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── OpenMetadata Ingestion (Airflow for metadata ingestion) ─────────────────
  ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:${OPENMETADATA_VERSION:-1.6.5}
    container_name: gov-ingestion
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_started
      mysql:
        condition: service_healthy
      openmetadata-server:
        condition: service_started
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: "/opt/airflow/dag_generated_configs"
      DB_HOST: gov-mysql
      DB_PORT: 3306
      AIRFLOW_DB: airflow_db
      DB_SCHEME: "mysql+mysqldb"
      DB_USER: airflow_user
      DB_PASSWORD: airflow_pass
    entrypoint: /bin/bash
    command:
      - "/opt/airflow/ingestion_dependency.sh"
    ports:
      - "${INGESTION_PORT:-8081}:8080"
    networks:
      - gov-internal
      - fmcg-network  # Need access to Project A databases for ingestion
    volumes:
      - ingestion-volume-dag-airflow:/opt/airflow/dag_generated_configs
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  gov-internal:
    driver: bridge
  fmcg-network:
    name: fmcg_fmcg-network
    external: true
